<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="32" height="32">
  <rect width="80" height="80" fill="#04080f" rx="8"/>
  <defs>
    <filter id="ga" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gb" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- lower diamond sides -->
  <line x1="63" y1="52" x2="40" y2="74" stroke="rgba(0,204,122,0.09)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="52" x2="40" y2="74" stroke="rgba(0,204,122,0.09)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- upper diamond sides -->
  <line x1="40" y1="29" x2="63" y2="52" stroke="rgba(0,204,122,0.15)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="40" y1="29" x2="17" y2="52" stroke="rgba(0,204,122,0.15)" stroke-width="1.3" stroke-linecap="round"/>
  <!-- upper half fill -->
  <polygon points="40,29 63,52 17,52" fill="rgba(0,204,122,0.03)"/>
  <!-- threshold dashed midline -->
  <line x1="17" y1="52" x2="63" y2="52" stroke="rgba(0,204,122,0.22)" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- bottom vertex ring -->
  <circle cx="40" cy="74" r="3" fill="none" stroke="rgba(0,204,122,0.22)" stroke-width="1"/>
  <!-- left vertex -->
  <circle cx="17" cy="52" r="1.8" fill="rgba(0,204,122,0.22)"/>
  <!-- right vertex — blue -->
  <circle cx="63" cy="52" r="3.2" fill="none" stroke="rgba(0,180,255,0.45)" stroke-width="1"/>
  <circle cx="63" cy="52" r="1.8" fill="#00b4ff" opacity="0.7"/>
  <!-- crossing node lines -->
  <line x1="27" y1="8"  x2="63" y2="52" stroke="rgba(0,204,122,0.52)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="51" y1="13" x2="17" y2="52" stroke="rgba(0,204,122,0.28)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- node A — left partner -->
  <circle cx="27" cy="8"  r="5"   fill="rgba(0,204,122,0.7)"  filter="url(#ga)"/>
  <circle cx="27" cy="8"  r="2.8" fill="#b0ffe0"/>
  <!-- node B — right partner -->
  <circle cx="51" cy="13" r="4.5" fill="rgba(0,204,122,0.65)" filter="url(#gb)"/>
  <circle cx="51" cy="13" r="2.2" fill="#b0ffe0"/>
</svg>
