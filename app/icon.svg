<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="32" height="32">
  <!-- Background -->
  <rect width="80" height="80" fill="#04080f" rx="8"/>
  <!-- Left bracket -->
  <path d="M22,8 L8,8 L8,72 L22,72" fill="none" stroke="#243248" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Right bracket -->
  <path d="M58,8 L72,8 L72,72 L58,72" fill="none" stroke="#00cc7a" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter"/>
  <!-- Blue diagonal (top-left to bottom-right) -->
  <line x1="20" y1="20" x2="60" y2="60" stroke="#4d9cf5" stroke-width="7" stroke-linecap="square"/>
  <!-- White cover (clears centre of blue) -->
  <line x1="60" y1="20" x2="20" y2="60" stroke="#04080f" stroke-width="12" stroke-linecap="square"/>
  <!-- White diagonal (top-right to bottom-left) -->
  <line x1="60" y1="20" x2="20" y2="60" stroke="#ffffff" stroke-width="7" stroke-linecap="square"/>
</svg>
